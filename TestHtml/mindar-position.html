<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-plane color="blue" opacity="0.5" position="0 0 0" height="0.552" width="1"></a-plane>
    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    const targetEl = document.querySelector('#target');

    sceneEl.addEventListener('arReady', () => console.log('arReady'));
    sceneEl.addEventListener('arError', (e) => console.error('arError', e));
    targetEl.addEventListener('targetFound', () => console.log('targetFound'));
    targetEl.addEventListener('targetLost', () => console.log('targetLost'));
  </script>
</body>
</html>
