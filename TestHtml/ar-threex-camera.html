<!DOCTYPE html>
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<!-- import three.js and ar-threex library as a module-->
<script type="importmap">
	{
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.min.js",
        "threex": "https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js-threejs@0.3.2/dist/ar.mjs"
      }
    }
</script>

<body style='font-family: Monospace;'>
	<div style='position: absolute; top: 10px; width:100%; text-align: center; z-index: 1;'>
		<a href="https://github.com/AR-js-org/AR.js/" target="_blank">AR.js</a> - three.js camera transform
		<br />
		Contact me any time at <a href='https://twitter.com/nicolocarp' target='_blank'>@nicolocarp</a>
	</div>
	<!-- 相機相對於 Marker 的位置與旋轉 -->
	<div id="camera-pose" style='position: absolute; left: 10px; bottom: 10px; z-index: 10; background: rgba(0,0,0,0.7); color: #0f0; padding: 8px 12px; font-size: 12px; line-height: 1.5; border-radius: 6px; min-width: 200px;'>
		<div><b>相機相對 Marker</b></div>
		<div>位置 X: <span id="pos-x">--</span></div>
		<div>位置 Y: <span id="pos-y">--</span></div>
		<div>位置 Z: <span id="pos-z">--</span></div>
		<div>旋轉 X: <span id="rot-x">--</span>°</div>
		<div>旋轉 Y: <span id="rot-y">--</span>°</div>
		<div>旋轉 Z: <span id="rot-z">--</span>°</div>
		<div>Marker: <span id="marker-visible">未偵測</span></div>
	</div>
	<script type="module">
		import * as THREE from 'three'
		import { THREEx } from 'threex'

		var ArToolkitSource = THREEx.ArToolkitSource
		var ArToolkitContext = THREEx.ArToolkitContext
		var ArMarkerControls = THREEx.ArMarkerControls

		ArToolkitContext.baseURL = './'

		//////////////////////////////////////////////////////////////////////////////////
		//		Init
		//////////////////////////////////////////////////////////////////////////////////

		// init renderer
		var renderer = new THREE.WebGLRenderer({
			antialias: true,
			alpha: true
		});
		renderer.setClearColor(new THREE.Color('lightgrey'), 0)
		renderer.setSize(640, 480);
		renderer.domElement.style.position = 'absolute'
		renderer.domElement.style.top = '0px'
		renderer.domElement.style.left = '0px'
		document.body.appendChild(renderer.domElement);

		// array of functions for the rendering loop
		var onRenderFcts = [];
		var arToolkitContext, arMarkerControls;

		// init scene and camera
		var scene = new THREE.Scene();

		//////////////////////////////////////////////////////////////////////////////////
		//		Initialize a basic camera
		//////////////////////////////////////////////////////////////////////////////////

		// Create a camera
		var camera = new THREE.Camera();
		scene.add(camera);

		////////////////////////////////////////////////////////////////////////////////
		//          handle arToolkitSource
		////////////////////////////////////////////////////////////////////////////////

		var arToolkitSource = new ArToolkitSource({
			// to read from the webcam
			sourceType: 'webcam',

			sourceWidth: window.innerWidth > window.innerHeight ? 640 : 480,
			sourceHeight: window.innerWidth > window.innerHeight ? 480 : 640,

			// // to read from an image
			// sourceType : 'image',
			// sourceUrl : THREEx.ArToolkitContext.baseURL + '../data/images/img.jpg',

			// to read from a video
			// sourceType : 'video',
			// sourceUrl : THREEx.ArToolkitContext.baseURL + '../data/videos/headtracking.mp4',
		})

		arToolkitSource.init(function onReady() {
			arToolkitSource.domElement.addEventListener('canplay', () => {
				console.log(
					'canplay',
					'actual source dimensions',
					arToolkitSource.domElement.videoWidth,
					arToolkitSource.domElement.videoHeight
				);

				initARContext();
			});
			window.arToolkitSource = arToolkitSource;
			setTimeout(() => {
				onResize()
			}, 2000);
		})

		// handle resize
		window.addEventListener('resize', function () {
			onResize()
		})

		function onResize() {
			arToolkitSource.onResizeElement()
			arToolkitSource.copyElementSizeTo(renderer.domElement)
			if (window.arToolkitContext.arController !== null) {
				arToolkitSource.copyElementSizeTo(window.arToolkitContext.arController.canvas)
			}
		}
		////////////////////////////////////////////////////////////////////////////////
		//          initialize arToolkitContext
		////////////////////////////////////////////////////////////////////////////////


		function initARContext() { // create atToolkitContext
			arToolkitContext = new ArToolkitContext({
				cameraParametersUrl: ArToolkitContext.baseURL + 'data/data/camera_para.dat',
				detectionMode: 'mono'
			})
			// initialize it
			arToolkitContext.init(() => { // copy projection matrix to camera
				camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());

				arToolkitContext.arController.orientation = getSourceOrientation();
				arToolkitContext.arController.options.orientation = getSourceOrientation();

				console.log('arToolkitContext', arToolkitContext);
				window.arToolkitContext = arToolkitContext;
			})

			// MARKER
			arMarkerControls = new ArMarkerControls(arToolkitContext, camera, {
				type: 'pattern',
				patternUrl: ArToolkitContext.baseURL + 'data/data/patt.hiro',
				// patternUrl : THREEx.ArToolkitContext.baseURL + '../data/data/patt.kanji',
				// as we controls the camera, set changeMatrixMode: 'cameraTransformMatrix'
				changeMatrixMode: 'cameraTransformMatrix'
			})

			scene.visible = false

			console.log('ArMarkerControls', arMarkerControls);
			window.arMarkerControls = arMarkerControls;
		}


		function getSourceOrientation() {
			if (!arToolkitSource) {
				return null;
			}

			console.log(
				'actual source dimensions',
				arToolkitSource.domElement.videoWidth,
				arToolkitSource.domElement.videoHeight
			);

			if (arToolkitSource.domElement.videoWidth > arToolkitSource.domElement.videoHeight) {
				console.log('source orientation', 'landscape');
				return 'landscape';
			} else {
				console.log('source orientation', 'portrait');
				return 'portrait';
			}
		}

		// WebSocket：連到同一個 host（本地 ws，Railway 上 wss）
		var arPoseWs = null
		var arPoseLastSend = 0
		var AR_POSE_SEND_INTERVAL_MS = 50  // 約 20 次/秒，避免頻寬過大
		function connectARPoseWebSocket() {
			var scheme = (location.protocol === 'https:') ? 'wss:' : 'ws:'
			var url = scheme + '//' + location.host
			try {
				arPoseWs = new WebSocket(url)
				arPoseWs.onopen = function () { console.log('[AR Pose] WebSocket 已連接:', url) }
				arPoseWs.onclose = function () { console.log('[AR Pose] WebSocket 已關閉') }
				arPoseWs.onerror = function (e) { console.warn('[AR Pose] WebSocket 錯誤', e) }
			} catch (e) { console.warn('[AR Pose] WebSocket 建立失敗', e) }
		}
		connectARPoseWebSocket()

		// 更新畫面上「相機相對 Marker」的顯示，並透過 WebSocket 送給 server（再轉 Unity）
		function updateCameraPoseDisplay() {
			var posX = document.getElementById('pos-x')
			var posY = document.getElementById('pos-y')
			var posZ = document.getElementById('pos-z')
			var rotX = document.getElementById('rot-x')
			var rotY = document.getElementById('rot-y')
			var rotZ = document.getElementById('rot-z')
			var markerVis = document.getElementById('marker-visible')
			if (!posX || !markerVis) return

			if (!camera.visible) {
				posX.textContent = '--'
				posY.textContent = '--'
				posZ.textContent = '--'
				rotX.textContent = '--'
				rotY.textContent = '--'
				rotZ.textContent = '--'
				markerVis.textContent = '未偵測'
				// 仍可送一筆 markerVisible: false 讓 Unity 知道目前沒偵測到
				if (arPoseWs && arPoseWs.readyState === WebSocket.OPEN) {
					var now = Date.now()
					if (now - arPoseLastSend >= AR_POSE_SEND_INTERVAL_MS) {
						arPoseLastSend = now
						arPoseWs.send(JSON.stringify({
							type: 'ar_camera_pose',
							data: {
								position: { x: 0, y: 0, z: 0 },
								rotation: { x: 0, y: 0, z: 0 },
								markerVisible: false
							},
							timestamp: now
						}))
					}
				}
				return
			}

			markerVis.textContent = '已偵測'
			var deg = 180 / Math.PI
			var rx = (camera.rotation.x * deg)
			var ry = (camera.rotation.y * deg)
			var rz = (camera.rotation.z * deg)
			posX.textContent = camera.position.x.toFixed(4)
			posY.textContent = camera.position.y.toFixed(4)
			posZ.textContent = camera.position.z.toFixed(4)
			rotX.textContent = rx.toFixed(2)
			rotY.textContent = ry.toFixed(2)
			rotZ.textContent = rz.toFixed(2)

			// 透過 WebSocket 送給 server，再轉發到 Unity（節流）
			if (arPoseWs && arPoseWs.readyState === WebSocket.OPEN) {
				var now = Date.now()
				if (now - arPoseLastSend >= AR_POSE_SEND_INTERVAL_MS) {
					arPoseLastSend = now
					arPoseWs.send(JSON.stringify({
						type: 'ar_camera_pose',
						data: {
							position: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
							rotation: { x: rx, y: ry, z: rz },
							markerVisible: true
						},
						timestamp: now
					}))
				}
			}
		}

		// update artoolkit on every frame
		onRenderFcts.push(function () {
			if (!arToolkitContext || !arToolkitSource || !arToolkitSource.ready) {
				return;
			}

			arToolkitContext.update(arToolkitSource.domElement)

			// update scene.visible if the marker is seen
			scene.visible = camera.visible

			// 更新網頁上的相機相對 Marker 數據
			updateCameraPoseDisplay()
		})

		//////////////////////////////////////////////////////////////////////////////////
		//		add an object in the scene
		//////////////////////////////////////////////////////////////////////////////////

		// add a torus knot
		var geometry = new THREE.BoxGeometry(1, 1, 1);
		var material = new THREE.MeshNormalMaterial({
			transparent: true,
			opacity: 0.5,
			side: THREE.DoubleSide
		});
		var mesh = new THREE.Mesh(geometry, material);
		mesh.position.y = geometry.parameters.height / 2
		scene.add(mesh);

		var geometry = new THREE.TorusKnotGeometry(0.3, 0.1, 64, 16);
		var material = new THREE.MeshNormalMaterial();
		var mesh = new THREE.Mesh(geometry, material);
		mesh.position.y = 0.5
		scene.add(mesh);

		onRenderFcts.push(function (delta) {
			mesh.rotation.x += Math.PI * delta
		})

		//////////////////////////////////////////////////////////////////////////////////
		//		render the whole thing on the page
		//////////////////////////////////////////////////////////////////////////////////

		// render the scene
		onRenderFcts.push(function () {
			renderer.render(scene, camera);
		})

		// run the rendering loop
		var lastTimeMsec = null
		requestAnimationFrame(function animate(nowMsec) {
			// keep looping
			requestAnimationFrame(animate);
			// measure time
			lastTimeMsec = lastTimeMsec || nowMsec - 1000 / 60
			var deltaMsec = Math.min(200, nowMsec - lastTimeMsec)
			lastTimeMsec = nowMsec
			// call each update function
			onRenderFcts.forEach(function (onRenderFct) {
				onRenderFct(deltaMsec / 1000, nowMsec / 1000)
			})
		})
	</script>
</body>
