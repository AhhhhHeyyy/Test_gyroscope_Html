<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<title>Hello, AR Cube!</title>

	<script src="AR-Examples-master/js/three.js"></script>
	<script src="AR-Examples-master/jsartoolkit5/artoolkit.min.js"></script>
	<script src="AR-Examples-master/jsartoolkit5/artoolkit.api.js"></script>
	<script src="AR-Examples-master/threex/threex-artoolkitsource.js"></script>
	<script src="AR-Examples-master/threex/threex-artoolkitcontext.js"></script>
	<script src="AR-Examples-master/threex/threex-arbasecontrols.js"></script>
	<script src="AR-Examples-master/threex/threex-armarkercontrols.js"></script>
	<script src="AR-Examples-master/threex/threex-arsmoothedcontrols.js"></script>
</head>

<body style="margin:0; overflow:hidden; font-family:Monospace;">

<div id="info" style="position:absolute; top:0; left:0; padding:8px; background:rgba(0,0,0,0.5); color:white; font-size:14px; z-index:1;"></div>

<script>
var scene, camera, renderer, clock, deltaTime, totalTime;
var arToolkitSource, arToolkitContext, smoothedControls;
var markerRoot1, smoothedRoot;
var mesh1;
var infoElement;
var TO_DEG = 180 / Math.PI;
var ws = null;
var wsConnected = false;
var lastPoseSentAt = 0;
var poseSendIntervalMs = 50; // 20Hz，避免每幀狂送

initialize();
animate();

function initialize()
{
	scene = new THREE.Scene();

	var ambientLight = new THREE.AmbientLight(0xcccccc, 0.5);
	scene.add(ambientLight);

	camera = new THREE.Camera();
	scene.add(camera);

	renderer = new THREE.WebGLRenderer({
		antialias: true,
		alpha: true
	});
	renderer.setClearColor(new THREE.Color('lightgrey'), 0);
	renderer.setSize(640, 480);
	renderer.domElement.style.position = 'absolute';
	renderer.domElement.style.top = '0px';
	renderer.domElement.style.left = '0px';
	document.body.appendChild(renderer.domElement);

	infoElement = document.getElementById('info');

	// 建立 WebSocket 連線（與 index.html 相同伺服器）
	try {
		var wsUrl = 'wss://testgyroscopehtml-production.up.railway.app';
		console.log('嘗試連接 WebSocket (AR)：', wsUrl);
		ws = new WebSocket(wsUrl);
		ws.onopen = function () {
			console.log('✅ AR WebSocket 連接已建立');
			wsConnected = true;
			try {
				ws.send(JSON.stringify({ type: 'claim', source: 'ar-threex' }));
			} catch (_) {}
		};
		ws.onclose = function (event) {
			console.log('❌ AR WebSocket 連接關閉:', event.code, event.reason);
			wsConnected = false;
		};
		ws.onerror = function (error) {
			console.error('❌ AR WebSocket 錯誤:', error);
		};
	} catch (e) {
		console.error('建立 AR WebSocket 連線失敗:', e);
	}

	clock = new THREE.Clock();
	deltaTime = 0;
	totalTime = 0;

	arToolkitSource = new THREEx.ArToolkitSource({
		sourceType: 'webcam'
	});

	function onResize()
	{
		arToolkitSource.onResize();
		arToolkitSource.copySizeTo(renderer.domElement);
		if (arToolkitContext && arToolkitContext.arController !== null)
		{
			arToolkitSource.copySizeTo(arToolkitContext.arController.canvas);
		}
	}

	arToolkitSource.init(function onReady(){
		onResize();
	});

	window.addEventListener('resize', function(){
		onResize();
	});

	arToolkitContext = new THREEx.ArToolkitContext({
		cameraParametersUrl: 'AR-Examples-master/data/camera_para.dat',
		detectionMode: 'mono'
	});

	arToolkitContext.init(function onCompleted(){
		camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
	});

	markerRoot1 = new THREE.Group();
	scene.add(markerRoot1);

	new THREEx.ArMarkerControls(arToolkitContext, markerRoot1, {
		type: 'pattern',
		patternUrl: 'AR-Examples-master/data/hiro.patt'
	});

	smoothedRoot = new THREE.Group();
	scene.add(smoothedRoot);

	smoothedControls = new THREEx.ArSmoothedControls(smoothedRoot, {
		lerpPosition: 0.8,
		lerpQuaternion: 0.8,
		lerpScale: 1
	});

	var geometry1 = new THREE.BoxGeometry(1, 1, 1);
	var material1 = new THREE.MeshNormalMaterial({
		transparent: true,
		opacity: 0.5,
		side: THREE.DoubleSide
	});

	mesh1 = new THREE.Mesh(geometry1, material1);
	mesh1.position.y = 0.5;
	smoothedRoot.add(mesh1);
}

function update()
{
	if (arToolkitSource.ready !== false)
		arToolkitContext.update(arToolkitSource.domElement);

	smoothedControls.update(markerRoot1);

	if (infoElement && smoothedRoot)
	{
		var p = smoothedRoot.position;
		var r = smoothedRoot.rotation;
		infoElement.innerHTML =
			'位置(相對 marker，單位 m)：' +
			'x=' + p.x.toFixed(2) + ', ' +
			'y=' + p.y.toFixed(2) + ', ' +
			'z=' + p.z.toFixed(2) + '<br>' +
			'角度(相對 marker，deg)：' +
			'rotX=' + (r.x * TO_DEG).toFixed(1) + ', ' +
			'rotY=' + (r.y * TO_DEG).toFixed(1) + ', ' +
			'rotZ=' + (r.z * TO_DEG).toFixed(1);

		// 將 AR「相機相對 Marker」位姿透過 WebSocket 傳給 Unity
		// Unity 端對應 GyroscopeReceiver.cs: case "ar_camera_pose"
		if (wsConnected && ws && ws.readyState === WebSocket.OPEN)
		{
			var now = Date.now();
			if (now - lastPoseSentAt >= poseSendIntervalMs)
			{
				lastPoseSentAt = now;
				var payload = {
					type: 'ar_camera_pose',
					data: {
						position: { x: p.x, y: p.y, z: p.z },
						rotation: { x: r.x * TO_DEG, y: r.y * TO_DEG, z: r.z * TO_DEG }, // deg
						markerVisible: !!(markerRoot1 && markerRoot1.visible)
					},
					timestamp: now
				};
				try {
					ws.send(JSON.stringify(payload));
				} catch (e) {
					console.error('❌ 傳送 AR 位姿資料失敗:', e);
				}
			}
		}
	}
}

function render()
{
	renderer.render(scene, camera);
}

function animate()
{
	requestAnimationFrame(animate);
	deltaTime = clock.getDelta();
	totalTime += deltaTime;
	update();
	render();
}
</script>

</body>
</html>
